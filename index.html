<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coding Tools</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    padding:10px 15px;
    border:none;
    cursor:pointer;
    background:#ddd;
    font-size:20px;
}

.tab.active{
    background:#2196F3;
    color:white;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

textarea{
    width:100%;
    aspect-ratio:1/1;
    border:2px solid #ccc;
    border-radius:20px;
    padding:15px;
    font-size:20px;
    box-sizing:border-box;
    resize:vertical;
    outline:none;
}

textarea:focus{
    border-color:#2196F3;
}

input{
    width:100%;
    height:70px;
    border:2px solid #ccc;
    border-radius:20px;
    padding:15px;
    font-size:20px;
    box-sizing:border-box;
    outline:none;
}

input:focus{
    border-color:#2196F3;
}
</style>
</head>
<body>

<div class="tabs">
    <button class="tab active"
        onclick="showPage('unicodePage',this)">
        Unicode Escape Converter
    </button>

    <button class="tab"
        onclick="showPage('decimalPage',this)">
        Decimal Converter
    </button>

    <button class="tab"
       onclick="showPage('jsonPage',this)">
       JSON Cleaner
    </button>
</div>

<!-- Unicode Page -->

<div id="unicodePage" class="page active">

<h2>Unicode Escape Sequence Converter</h2>

<textarea id="unicodeBox"
placeholder="Enter Unicode Escape Sequence"></textarea>

<textarea id="textBox"
placeholder="Enter Text"></textarea>

</div>

<!-- Decimal Page -->

<div id="decimalPage" class="page">

<h2>Decimal Converter</h2>

<label>Decimal</label>
<input type="text" id="decimal" value="0">

<label>Binary</label>
<input type="text" id="binary" value="0">

<label>Octal</label>
<input type="text" id="octal" value="0">

<label>Hex</label>
<input type="text" id="hex" value="0">

</div>

<!-- JSON Cleaner Page -->

<div id="jsonPage" class="page">

<h3>JSON Cleaner</h3>

<textarea id="jsonDirty"
placeholder="Paste Unclean JSON Here"></textarea>

<textarea id="jsonClean"
placeholder="Clean JSON Here"></textarea>

</div>

<script>

/* ==========================
   PAGE SYSTEM
========================== */

function showPage(id,btn){

    document.querySelectorAll(".page")
    .forEach(page=>{
        page.classList.remove("active");
    });

    document.querySelectorAll(".tab")
    .forEach(tab=>{
        tab.classList.remove("active");
    });

    document
    .getElementById(id)
    .classList.add("active");

    btn.classList.add("active");
}

/* ==========================
   UNICODE CONVERTER
========================== */

const unicodeBox =
document.getElementById("unicodeBox");

const textBox =
document.getElementById("textBox");

let updatingUnicode = false;

function encodeUnicode(str){
    return [...str]
    .map(ch =>
        "\\u" +
        ch.charCodeAt(0)
        .toString(16)
        .padStart(4,"0")
    )
    .join("");
}

function decodeUnicode(str){

    try{
        return str.replace(
            /\\u([0-9a-fA-F]{4})/g,
            (_,hex)=>
            String.fromCharCode(
                parseInt(hex,16)
            )
        );
    }
    catch{
        return "";
    }
}

unicodeBox.addEventListener(
"input",()=>{

    if(updatingUnicode) return;

    updatingUnicode = true;

    textBox.value =
    decodeUnicode(
        unicodeBox.value
    );

    updatingUnicode = false;
});

textBox.addEventListener(
"input",()=>{

    if(updatingUnicode) return;

    updatingUnicode = true;

    unicodeBox.value =
    encodeUnicode(
        textBox.value
    );

    updatingUnicode = false;
});

/* ==========================
   DECIMAL CONVERTER
========================== */

const decimalBox =
document.getElementById("decimal");

const binaryBox =
document.getElementById("binary");

const octalBox =
document.getElementById("octal");

const hexBox =
document.getElementById("hex");

let updatingNumber = false;

function fromDecimal(){

    let n =
    parseInt(
        decimalBox.value || 0,
        10
    );

    binaryBox.value =
    n.toString(2);

    octalBox.value =
    n.toString(8);

    hexBox.value =
    n.toString(16)
    .toUpperCase();
}

function fromBinary(){

    let n =
    parseInt(
        binaryBox.value || 0,
        2
    );

    decimalBox.value = n;

    octalBox.value =
    n.toString(8);

    hexBox.value =
    n.toString(16)
    .toUpperCase();
}

function fromOctal(){

    let n =
    parseInt(
        octalBox.value || 0,
        8
    );

    decimalBox.value = n;

    binaryBox.value =
    n.toString(2);

    hexBox.value =
    n.toString(16)
    .toUpperCase();
}

function fromHex(){

    let n =
    parseInt(
        hexBox.value || 0,
        16
    );

    decimalBox.value = n;

    binaryBox.value =
    n.toString(2);

    octalBox.value =
    n.toString(8);
}

decimalBox.addEventListener(
"input",()=>{

    if(updatingNumber) return;

    updatingNumber = true;

    fromDecimal();

    updatingNumber = false;
});

binaryBox.addEventListener(
"input",()=>{

    if(updatingNumber) return;

    updatingNumber = true;

    fromBinary();

    updatingNumber = false;
});

octalBox.addEventListener(
"input",()=>{

    if(updatingNumber) return;

    updatingNumber = true;

    fromOctal();

    updatingNumber = false;
});

hexBox.addEventListener(
"input",()=>{

    if(updatingNumber) return;

    updatingNumber = true;

    fromHex();

    updatingNumber = false;
});

/* ==========================
   JSON CLEANER
========================== */

const jsonDirty =
document.getElementById("jsonDirty");

const jsonClean =
document.getElementById("jsonClean");

let updatingJson = false;

jsonDirty.addEventListener(
"input",()=>{

    if(updatingJson) return;

    updatingJson = true;

    try{

        const obj =
        JSON.parse(
            jsonDirty.value
        );

        jsonClean.value =
        JSON.stringify(
            obj,
            null,
            4
        );

    }catch{

        jsonClean.value = "";
    }

    updatingJson = false;
});

jsonClean.addEventListener(
"input",()=>{

    if(updatingJson) return;

    updatingJson = true;

    try{

        const obj =
        JSON.parse(
            jsonClean.value
        );

        jsonDirty.value =
        JSON.stringify(obj);

    }catch{}

    updatingJson = false;
});

</script>

</body>
</html>
